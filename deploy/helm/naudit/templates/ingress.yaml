{{- if .Values.ingress.enabled }}
# TLS terminiert am Ingress; Naudit honoriert X-Forwarded-Proto von selbst
# (einschraenkbar via Naudit__ForwardedHeaders__KnownNetworks__0 in extraEnv).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "naudit.fullname" . }}
  labels:
    {{- include "naudit.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "naudit.fullname" . }}
                port:
                  name: http
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
