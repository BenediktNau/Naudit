# Default-Werte fuer das Naudit-Chart.
#
# Bewusst schlank: nur der Bootstrap (DB + Admin-Seed) laeuft ueber das Chart —
# alles Weitere (Plattform, Tokens, AI-Provider, Webhook-Secret) konfiguriert
# der Admin nach dem ersten Start auf der Settings-Seite; die Werte liegen in
# der DB. Env-Overrides sind trotzdem via extraEnv moeglich (env gewinnt ueber
# die DB und sperrt den Key auf der Settings-Seite).

image:
  repository: ghcr.io/benediktnau/naudit
  # Fuer den Betrieb auf eine Release-Version pinnen (z. B. "v0.1.12").
  tag: latest
  pullPolicy: IfNotPresent

# Das ghcr-Package ist per Default privat -> Pull-Secret noetig (GitHub-PAT mit
# read:packages), z. B.:
#   kubectl -n naudit create secret docker-registry ghcr-pull \
#     --docker-server=ghcr.io --docker-username=<user> --docker-password=<pat>
imagePullSecrets: []
# - name: ghcr-pull

db:
  # Sqlite (Default, braucht das /data-Volume) | Postgres (externe DB, kein Volume)
  provider: Sqlite
  # Nur fuer Postgres, und nur wenn bootstrap.existingSecret leer ist.
  # Achtung: landet dann im Helm-Release-Verlauf — fuer Produktion besser
  # bootstrap.existingSecret verwenden.
  connectionString: ""

# Ein Secret mit den Bootstrap-Werten:
#   admin-initial-password              (immer)
#   db-connection-string                (nur bei db.provider=Postgres)
# Leer = das Chart rendert selbst ein Secret aus admin.initialPassword /
# db.connectionString.
bootstrap:
  existingSecret: ""

admin:
  username: admin
  # Initialpasswort des Seed-Admins (nur erster Start gegen leere DB; danach
  # im UI aendern). Nur relevant, wenn bootstrap.existingSecret leer ist —
  # dann Pflicht. Nicht in ein values-File einchecken; per --set setzen.
  initialPassword: ""

# Zusaetzliche Naudit__*-Env-Overrides (Liste von EnvVar-Objekten).
extraEnv: []
# - name: Naudit__AccessGate__Mode
#   value: Registered

# Nur bei db.provider=Sqlite relevant.
persistence:
  # false = emptyDir: DB (Settings, Accounts, Historie) ist bei jedem
  # Pod-Neustart WEG — nur fuer Wegwerf-Tests.
  enabled: true
  size: 1Gi
  storageClassName: ""
  # Bestehendes PVC statt eines chart-verwalteten verwenden.
  existingClaim: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations: {}
  # cert-manager.io/cluster-issuer: <euer-issuer>
  host: naudit.example.internal
  tls: []
  # - secretName: naudit-tls
  #   hosts:
  #     - naudit.example.internal

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi

# fsGroup 1654 = $APP_UID des aspnet-Basisimages: macht das gemountete
# /data-Volume fuer den non-root-User beschreibbar.
podSecurityContext:
  fsGroup: 1654

securityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
