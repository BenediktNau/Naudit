name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false   # PR-Gate baut/testet nur — keine Git-Credentials noetig

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Naudit.slnx

      - name: Build
        run: dotnet build Naudit.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Naudit.slnx -c Release --no-build
